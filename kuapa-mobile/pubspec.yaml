name: kuapa
description: Kuapa - Farmer-to-Buyer Digital Marketplace for Ghana
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Location
  geolocator: ^11.0.0

  # WebSocket (for chat)
  socket_io_client: ^2.0.3+1

  # Notifications
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.1
  flutter_local_notifications: ^17.1.2

  # UI helpers
  shimmer: ^3.0.0
  intl: ^0.19.0
  timeago: ^3.6.1
  badges: ^3.1.2

  # Utils
  uuid: ^4.4.0
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/kuapa_logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/crops/vegetables/tomato/
    - assets/images/crops/vegetables/pepper/
    - assets/images/crops/vegetables/onion/
    - assets/images/crops/vegetables/okra/
    - assets/images/crops/vegetables/cabbage/
    - assets/images/crops/vegetables/carrot/
    - assets/images/crops/vegetables/garden_egg/
    - assets/images/crops/staples/yam/
    - assets/images/crops/staples/cassava/
    - assets/images/crops/staples/plantain/
    - assets/images/crops/staples/maize/
    - assets/images/crops/staples/rice/
    - assets/images/crops/staples/cocoyam/
    - assets/images/crops/staples/sweet_potato/
    - assets/images/crops/legumes/groundnut/
    - assets/images/crops/legumes/cowpea/
    - assets/images/crops/fruits/mango/
    - assets/images/crops/fruits/watermelon/
    - assets/images/crops/fruits/pineapple/
    - assets/images/crops/spices/ginger/
    - assets/icons/
